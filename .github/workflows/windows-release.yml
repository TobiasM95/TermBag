name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_BRANCH: release

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Validate release branch
        run: |
          if [ "$GITHUB_REF_NAME" != "$RELEASE_BRANCH" ]; then
            echo "This workflow only publishes from the '$RELEASE_BRANCH' branch. Current ref: '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read release version
        id: version
        run: |
          version="$(node -p "require('./package.json').version")"
          if [ -z "$version" ]; then
            echo "package.json version is empty." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create or validate GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          release_json="$(gh release view "$TAG" --json tagName,targetCommitish,url 2>/dev/null || true)"

          if [ -n "$release_json" ]; then
            existing_target="$(printf '%s' "$release_json" | node -e "let data='';process.stdin.on('data', (chunk) => data += chunk);process.stdin.on('end', () => { const release = JSON.parse(data); process.stdout.write(release.targetCommitish || ''); });")"
            if [ "$existing_target" != "$GITHUB_SHA" ]; then
              echo "Release $TAG already exists and targets $existing_target instead of $GITHUB_SHA. Bump package.json version before publishing again." >&2
              exit 1
            fi

            echo "Release $TAG already exists for this commit. Reusing it."
            exit 0
          fi

          gh release create "$TAG" \
            --title "TermBag v$VERSION" \
            --generate-notes \
            --target "$GITHUB_SHA"

  publish_windows:
    needs: prepare_release
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test suite
        run: pnpm test

      - name: Clean generated output
        run: |
          foreach ($path in @("dist", "dist-electron", "release")) {
            if (Test-Path $path) {
              Remove-Item -Recurse -Force $path
            }
          }

      - name: Build Windows packages
        run: pnpm package:win

      - name: Upload Windows release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          $assets = Get-ChildItem -Path release -File | Where-Object {
            $_.Name -match '\.(exe|blockmap|yml)$'
          }

          if (-not $assets) {
            throw "No release assets found in release/."
          }

          foreach ($asset in $assets) {
            gh release upload $env:TAG $asset.FullName --clobber
          }

  publish_macos:
    needs: prepare_release
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test suite
        run: pnpm test

      - name: Clean generated output
        run: rm -rf dist dist-electron release

      - name: Build macOS packages
        run: pnpm package:mac

      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          shopt -s nullglob
          assets=(release/*.dmg release/*.zip release/*.blockmap release/latest-mac.yml)

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No macOS release assets found in release/." >&2
            exit 1
          fi

          gh release upload "$TAG" "${assets[@]}" --clobber
