name: Windows Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_BRANCH: release

jobs:
  publish:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Validate release branch
        run: |
          if ($env:GITHUB_REF_NAME -ne $env:RELEASE_BRANCH) {
            throw "This workflow only publishes from the '$env:RELEASE_BRANCH' branch. Current ref: '$env:GITHUB_REF_NAME'."
          }

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test suite
        run: pnpm test

      - name: Clean generated output
        run: |
          foreach ($path in @("dist", "dist-electron", "release")) {
            if (Test-Path $path) {
              Remove-Item -Recurse -Force $path
            }
          }

      - name: Build Windows packages
        run: pnpm package:win

      - name: Read release version
        id: version
        run: |
          $version = node -p "require('./package.json').version"
          if (-not $version) {
            throw "package.json version is empty."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Ensure release tag is new
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release view $env:TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $env:TAG already exists. Bump package.json version before publishing again."
          }

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create $env:TAG `
            --title "TermBag v$env:VERSION" `
            --generate-notes `
            --target $env:GITHUB_SHA

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $assets = Get-ChildItem -Path release -File | Where-Object {
            $_.Name -match '\.(exe|blockmap|yml)$'
          }

          if (-not $assets) {
            throw "No release assets found in release/."
          }

          foreach ($asset in $assets) {
            gh release upload $env:TAG $asset.FullName --clobber
          }
